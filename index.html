<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>innrscpe.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --dim: rgba(255,255,255,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Epilogue', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    /* ── HERO ── */
    #hero {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero-content {
      text-align: center;
    }

    @keyframes blurIn {
      from { opacity: 0; filter: blur(12px); transform: translateY(6px); }
      to   { opacity: 1; filter: blur(0px);  transform: translateY(0); }
    }

    .hero-title {
      font-family: 'Roboto', sans-serif;
      font-size: 1.75rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1;
      opacity: 0;
      animation: blurIn 1.25s ease 0.375s forwards;
    }

    .hero-sub {
      margin-top: 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      opacity: 0;
      animation: blurIn 1.25s ease 1.875s forwards;
    }

    /* Arrow */
    .arrow {
      position: absolute;
      bottom: max(2.5rem, env(safe-area-inset-bottom) + 2rem);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      opacity: 0;
      animation: arrowIn 1.25s ease 3.6s forwards, bob 2.5s ease-in-out 6s infinite;
      cursor: none;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .arrow {
        bottom: 6rem;
      }
    }

    @keyframes arrowIn {
      from { opacity: 0; filter: blur(8px); }
      to   { opacity: 1; filter: blur(0px); }
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    .arrow svg {
      width: 18px;
      height: 18px;
      stroke: rgba(255,255,255,0.65);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── LINKS SECTION ── */
    #links {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 0;
    }

    .links-list {
      list-style: none;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .links-list li {
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .links-list li:last-child {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .links-list a {
      display: block;
      padding: 1.6rem 0;
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      transition: color 0.3s ease, letter-spacing 0.3s ease;
    }

    .links-list a:hover {
      color: var(--white);
      letter-spacing: 0.5em;
    }

    /* ── EMAIL SIGNUP ── */
    #notify {
      width: 100%;
      max-width: 400px;
      margin-top: 5rem;
      text-align: center;
    }

    .notify-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 1.6rem;
      display: block;
    }

    .notify-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .notify-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      padding: 0.8rem 0;
      outline: none;
      text-align: center;
      transition: border-color 0.3s ease;
      width: 100%;
    }

    .notify-input::placeholder {
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.3em;
    }

    .notify-input:focus {
      border-color: var(--white);
    }

    .notify-btn {
      margin-top: 0.8rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.65);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      cursor: none;
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    .notify-btn:hover {
      border-color: var(--white);
      color: var(--white);
    }

    /* ── MERCH ── */
    #merch {
      width: 100%;
      max-width: 600px;
      margin-top: 5rem;
      padding-top: 5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    .tee-grid {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .tee-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .tee-img-wrap {
      width: 160px;
      height: 180px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tee-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      mix-blend-mode: lighten;
      transition: filter 0.4s ease;
    }

    .tee-img-wrap img:hover {
      filter: grayscale(0%);
    }

    .tee-caption {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    .merch-price {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.65);
      margin: 1.6rem 0;
      padding: 1.6rem 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }
    .merch-label {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      display: block;
      margin-bottom: 1.6rem;
    }

    .merch-link {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65) !important;
      text-decoration: none !important;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 0.2rem;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .merch-link:visited {
      color: rgba(255,255,255,0.65) !important;
    }

    .merch-link:hover {
      color: var(--white) !important;
      border-color: var(--white);
    }

    /* ── FOOTER ── */
    footer {
      padding: 4rem 2rem;
      text-align: center;
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 80vw;
      max-height: 80vh;
      object-fit: contain;
      filter: grayscale(100%);
      animation: blurIn 0.4s ease forwards;
    }

    .tee-img-wrap img {
      cursor: none;
    }
    @media (max-width: 600px) {
      .links-list a {
        padding: 1.4rem 0;
      }
    }
    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      filter: grayscale(100%);
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-content">
      <h1 class="hero-title">innerscape.</h1>
      <p class="hero-sub">Mute the thoughts</p>
    </div>
    <a class="arrow" href="#links" aria-label="Scroll down">
      <svg viewBox="0 0 24 24">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </a>
  </section>

  <!-- LINKS -->
  <section id="links">
    <ul class="links-list">
      <li><a href="https://www.youtube.com/@innerscapeOfficial" target="_blank" rel="noopener">YouTube</a></li>
      <li><a href="https://www.instagram.com/innrscpe/" target="_blank" rel="noopener">Instagram</a></li>
      <li><a href="https://www.facebook.com/profile.php?id=61568790236712&locale=cs_CZ" target="_blank" rel="noopener">Facebook</a></li>
      <li><a href="https://soundcloud.com/innerscapeoffical" target="_blank" rel="noopener">SoundCloud</a></li>
    </ul>

    <!-- MERCH -->
    <div id="merch">
      <span class="merch-label">Be part of innerscape.</span>
      <div class="tee-grid">
        <div class="tee-item">
          <div class="tee-img-wrap">
            <img src="MTT_-_front.png" alt="innrscpe. tee — front" />
          </div>
          <span class="tee-caption">front</span>
        </div>
        <div class="tee-item">
          <div class="tee-img-wrap">
            <img src="MTT_-_back.png" alt="innrscpe. tee — back" />
          </div>
          <span class="tee-caption">back</span>
        </div>
        <div class="tee-item">
          <div class="tee-img-wrap">
            <img src="MTT_-_side.png" alt="innrscpe. tee — side" />
          </div>
          <span class="tee-caption">side</span>
        </div>
      </div>
      <span class="merch-price">29 EUR</span>
      <a class="merch-link" href="https://buy.stripe.com/5kQ6oA9D5ep99Ev3xpaEE00" target="_blank" rel="noopener">innrscpe. tee →</a>
    </div>
  </section>



  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    document.querySelectorAll('.tee-img-wrap img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.add('active');
      });
    });

    lightbox.addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    // Email signup (placeholder)
    document.querySelector('.notify-btn').addEventListener('click', () => {
      const input = document.querySelector('.notify-input');
      if (input.value && input.value.includes('@')) {
        input.value = '';
        input.placeholder = 'noted.';
      }
    });
  </script>

</body>
</html>
